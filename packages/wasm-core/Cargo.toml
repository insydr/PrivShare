[package]
name = "wasm-core"
version = "1.0.0"
edition = "2021"
authors = ["PrivShare Team"]
description = "WebAssembly core library for PrivShare - Zero-Trust document redaction"
license = "MIT"
repository = "https://github.com/insydr/privshare"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
# WASM JavaScript interop
wasm-bindgen = "0.2.92"
wasm-bindgen-futures = "0.4.42"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"

# Image processing
image = "0.25"

# Cryptographic hashing (SHA-256)
sha2 = "0.10"

# Error handling
console_error_panic_hook = { version = "0.1.7", optional = true }
js-sys = "0.3.69"
thiserror = "1.0"

# Memory efficient types
base64 = "0.22"

[dependencies.web-sys]
version = "0.3.69"
features = [
  "console",
  "Window",
  "Document",
  "Element",
  "HtmlCanvasElement",
  "CanvasRenderingContext2d",
  "ImageData",
  "Blob",
  "File",
  "FileReader",
  "Url",
]

[dev-dependencies]
wasm-bindgen-test = "0.3.42"

[profile.release]
# Optimize for small WASM binary size while maintaining performance
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true
