# ============================================================
# PrivShare Security Configuration
# ============================================================
#
# Nginx Security Headers Configuration for PrivShare
# Place this in /etc/nginx/conf.d/privshare-security.conf
# or include in your main nginx.conf server block

# ============================================================
# Security Headers
# ============================================================

# HTTP Strict Transport Security (HSTS)
# Forces browsers to use HTTPS for all future requests
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy (Feature Policy)
# Disable access to sensitive browser features
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;

# Content Security Policy
# This is the main security header for XSS prevention
# Adjust domains as needed for your deployment
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.privshare.app wss://api.privshare.app; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

# Cache Control for sensitive pages
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;

# ============================================================
# Rate Limiting
# ============================================================

# Limit requests to prevent DoS attacks
# Adjust limits based on your needs
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

# ============================================================
# SSL/TLS Configuration
# ============================================================

# Only use strong TLS versions
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-Poly1305:ECDHE-RSA-CHACHA20-Poly1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# OCSP Stapling for faster TLS handshakes
ssl_stapling on;
ssl_stapling_verify on;

# ============================================================
# Server Block
# ============================================================

server {
    listen 80;
    server_name privshare.app www.privshare.app;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name privshare.app www.privshare.app;
    
    # Document root
    root /var/www/privshare;
    index index.html;
    
    # Include security headers from above
    # They are applied globally via add_header directives
    
    # ============================================================
    # Static Asset Caching
    # ============================================================
    
    # JavaScript, CSS, and WASM files - long cache with immutable
    location ~* \.(js|css|wasm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        # Enable compression
        gzip_static on;
    }
    
    # Images and fonts - medium cache
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # HTML files - no caching for security
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # JSON files - short cache
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # ============================================================
    # Security Restrictions
    # ============================================================
    
    # Block access to hidden files
    location ~ /\.[^/]+ {
        deny all;
    }
    
    # Block access to backup files
    location ~* \.(bak|backup|old|orig|save|swp|swo)$ {
        deny all;
    }
    
    # Block access to source control directories
    location ~ /\.(git|svn|hg)/ {
        deny all;
    }
    
    # Block access to config files
    location ~* \.(conf|config|ini|log|sh|sql)$ {
        deny all;
    }
    
    # ============================================================
    # SPA Routing
    # ============================================================
    
    # For Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ============================================================
    # Error Pages
    # ============================================================
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # Disable server version disclosure
    server_tokens off;
}

