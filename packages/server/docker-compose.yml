# ============================================
# PrivShare Server Docker Compose
# ============================================
# 
# Development and Production Configuration
# 
# IMPORTANT: This is a stateless signaling server.
# NO volumes are needed - all data is in-memory.
# 
# ============================================

services:
  privshare-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privshare-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - JWT_EXPIRES_IN=24h
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_JSON_PAYLOAD=10kb
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - privshare-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # No volumes - stateless server
    # security_opt:
    #   - no-new-privileges:true
    # read_only: true

networks:
  privshare-network:
    driver: bridge
